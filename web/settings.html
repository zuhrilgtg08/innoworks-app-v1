<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App V1 - Settings</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0F1419 0%, #1A1F2E 100%);
            color: #FFFFFF;
            min-height: 100vh;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: #0F1419;
            border-right: 1px solid #2A3142;
            padding: 24px;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
        }

        .sidebar-logo {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #5B6FFF;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .sidebar-title {
            font-size: 20px;
            font-weight: 700;
        }

        .nav-menu {
            list-style: none;
            flex: 1;
        }

        .nav-item {
            margin-bottom: 12px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            color: #A8AABC;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
        }

        .nav-link:hover {
            background: #1A1F2E;
            color: #FFFFFF;
        }

        .nav-link.active {
            background: #5B6FFF;
            color: #FFFFFF;
        }

        .nav-icon {
            font-size: 18px;
            width: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-content {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
        }

        .header {
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid #2A3142;
        }

        .header-title {
            font-size: 32px;
            font-weight: 700;
        }

        .header-subtitle {
            color: #A8AABC;
            font-size: 14px;
            margin-top: 4px;
        }

        .card {
            background: #1A1F2E;
            border: 1px solid #2A3142;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #5B6FFF;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
        }

        .user-info h3 {
            font-size: 16px;
            margin-bottom: 4px;
        }

        .user-info p {
            color: #A8AABC;
            font-size: 12px;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #2A3142;
        }

        .setting-item:last-child {
            border-bottom: none;
        }

        .setting-label {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .setting-icon {
            font-size: 20px;
        }

        .setting-text {
            color: #FFFFFF;
            font-size: 14px;
            font-weight: 500;
        }

        .setting-value {
            color: #A8AABC;
            font-size: 12px;
        }

        .setting-arrow {
            color: #A8AABC;
            font-size: 18px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-logout {
            background: #FF6B6B;
            color: #FFFFFF;
            width: 100%;
            margin-top: 24px;
        }

        .btn-logout:hover {
            background: #EF4444;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">⚡</div>
                <div class="sidebar-title">App V1</div>
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="index.html" class="nav-link">
                        <span class="nav-icon">🏠</span>
                        <span>Beranda</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="live-cam.html" class="nav-link">
                        <span class="nav-icon">📷</span>
                        <span>Live Cam</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="training.html" class="nav-link">
                        <span class="nav-icon">⚡</span>
                        <span>Training</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="logs.html" class="nav-link">
                        <span class="nav-icon">📋</span>
                        <span>Log Sistem</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="settings.html" class="nav-link active">
                        <span class="nav-icon">⚙️</span>
                        <span>Pengaturan</span>
                    </a>
                </li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <div class="header">
                <div class="header-title">Settings</div>
                <div class="header-subtitle">Pengaturan akun dan aplikasi</div>
            </div>

            <!-- User Profile Card -->
            <div class="card">
                <div class="user-profile">
                    <div class="avatar">AP</div>
                    <div class="user-info">
                        <h3>Andi Pratama</h3>
                        <p>andi@appv1.ai</p>
                    </div>
                </div>
            </div>

            <!-- Settings Menu 1 -->
            <div class="card">
                <div class="setting-item">
                    <div class="setting-label">
                        <span class="setting-icon">👤</span>
                        <span class="setting-text">Edit Profile</span>
                    </div>
                    <span class="setting-arrow">›</span>
                </div>
                <div class="setting-item">
                    <div class="setting-label">
                        <span class="setting-icon">🔐</span>
                        <span class="setting-text">Change Password</span>
                    </div>
                    <span class="setting-arrow">›</span>
                </div>
                <div class="setting-item">
                    <div class="setting-label">
                        <span class="setting-icon">🔔</span>
                        <span class="setting-text">Notifications</span>
                    </div>
                    <span class="setting-arrow">›</span>
                </div>
                <div class="setting-item">
                    <div class="setting-label">
                        <span class="setting-icon">🌙</span>
                        <span class="setting-text">Dark Mode</span>
                    </div>
                    <span class="setting-arrow">›</span>
                </div>
            </div>

            <!-- Settings Menu 2 - About -->
            <div class="card">
                <div class="setting-item">
                    <div class="setting-label">
                        <span class="setting-icon">ℹ️</span>
                        <span class="setting-text">App Version</span>
                    </div>
                    <span class="setting-value">1.0.0</span>
                </div>
                <div class="setting-item">
                    <div class="setting-label">
                        <span class="setting-icon">?</span>
                        <span class="setting-text">Help & Support</span>
                    </div>
                    <span class="setting-arrow">›</span>
                </div>
                <div class="setting-item">
                    <div class="setting-label">
                        <span class="setting-icon">📋</span>
                        <span class="setting-text">Terms & Privacy</span>
                    </div>
                    <span class="setting-arrow">›</span>
                </div>
            </div>

            <!-- Logout Button -->
            <button class="btn btn-logout">🚪 Logout</button>
        </div>
    </div>
</body>
</html>
